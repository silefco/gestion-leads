<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

<body>
<div id="app"></div>
<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function genId(){return"L"+Date.now().toString(36).toUpperCase()}
function today(){return new Date().toISOString().split("T")[0]}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split("T")[0]}
function fmtDate(d){if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}
function daysAgo(d){if(!d)return 0;var diff=new Date()-new Date(d+"T12:00:00");return Math.floor(diff/86400000)}
function isToday(d){return d===today()}
function daysSince(d){if(!d)return 0;return Math.floor((new Date()-new Date(d+"T12:00:00"))/(1000*60*60*24))}
function hoursSince(isoStr){if(!isoStr)return 999;return Math.floor((new Date()-new Date(isoStr))/(1000*60*60))}
function responseIndicator(lead){
  if(lead.messageEnvoye)return null;
  var skipStatuts=["Message envoyé","En échange","RDV proposé","Visite prévue"];
  if(skipStatuts.indexOf(lead.statut)>=0)return null;
  var h=hoursSince(lead.createdAt);
  var color=h<2?"#10B981":h<24?"#F59E0B":"#EF4444";
  var label=h<1?"<1h":h<24?h+"h":Math.floor(h/24)+"j";
  var dot=h<2?"🟢":h<24?"🟡":"🔴";
  return el("span",{style:"font-size:10px;font-weight:700;color:"+color+";white-space:nowrap;margin-left:2px"},dot+" "+label);
}
function isPast(d){return d&&d<today()}
function qs(s){return document.querySelector(s)}
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="class")e.className=props[k];
    else if(k==="style")e.style.cssText=props[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else e.setAttribute(k,props[k]);
  });
  if(children!==undefined){
    if(typeof children==="string")e.innerHTML=children;
    else if(Array.isArray(children))children.forEach(function(c){if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});
    else if(children instanceof Node)e.appendChild(children);
  }
  return e;
}

// ── Storage ───────────────────────────────────────────────────────────────────
function getKey(){return localStorage.getItem("gl_key")||""}
function saveKey(k){localStorage.setItem("gl_key",k)}
function getGmailScript(){return localStorage.getItem("gl_gmail_script")||""}
function saveGmailScript(u){localStorage.setItem("gl_gmail_script",u)}
function loadLeads(){try{return JSON.parse(localStorage.getItem("gl_v1")||"[]")}catch(e){return[]}}
function saveLeads(l){localStorage.setItem("gl_v1",JSON.stringify(l))}
function loadDormants(){try{return JSON.parse(localStorage.getItem("gl_dormants")||"[]")}catch(e){return[]}}
function saveDormants(d){localStorage.setItem("gl_dormants",JSON.stringify(d))}
function loadTemplates(){
  try{return JSON.parse(localStorage.getItem("gl_templates")||"null")}catch(e){return null}
}
function saveTemplates(t){localStorage.setItem("gl_templates",JSON.stringify(t))}
function getLastEmailDate(){return localStorage.getItem("gl_last_email")||""}
function saveLastEmailDate(d){localStorage.setItem("gl_last_email",d)}

// ── State ─────────────────────────────────────────────────────────────────────
var state={
  leads:loadLeads(),
  dormants:loadDormants(),
  view:"relances",
  selectedId:null,
  selectedDormantId:null,
  apiKey:getKey(),
  gmailScript:getGmailScript(),
  templates:loadTemplates()||getDefaultTemplates()
};
function setState(patch){
  Object.assign(state,typeof patch==="function"?patch(state):patch);
  saveLeads(state.leads);
  saveDormants(state.dormants);
  if(state.templates)saveTemplates(state.templates);
  render();
}

// ── Config ────────────────────────────────────────────────────────────────────
var ST={
  "Nouveau":{color:"#3B82F6",bg:"#1D3557",icon:"✦",step:0},
  "Message envoyé":{color:"#10B981",bg:"#064E3B",icon:"✉",step:1},
  "En échange":{color:"#06B6D4",bg:"#0C4A6E",icon:"↔",step:2},
  "RDV proposé":{color:"#F59E0B",bg:"#451A03",icon:"◈",step:3},
  "Visite prévue":{color:"#8B5CF6",bg:"#2E1065",icon:"⌂",step:4},
  "Sans réponse":{color:"#6B7280",bg:"#1F2937",icon:"◌",step:1},
  "Perdu":{color:"#EF4444",bg:"#450A0A",icon:"✕",step:0}
};
var PIPELINE_STEPS=["Nouveau","Message envoyé","En échange","RDV proposé","Visite prévue"];
var PR={"Haute":{color:"#EF4444",label:"↑ Haute"},"Normale":{color:"#3B82F6",label:"→ Normale"},"Basse":{color:"#94A3B8",label:"↓ Basse"}};
var STEP_ORDER=["Nouveau","Message envoyé","En échange","RDV proposé","Visite prévue"];
var PLATS=["","SeLoger","LeBonCoin","PAP","Bien'ici","Logic-Immo","WhatsApp","Email","Autre"];

function stag(s,sm){
  var c=ST[s]||ST["Nouveau"];
  var t=el("span",{class:"tag",style:"color:"+c.color+";background:"+c.bg+";border:1px solid "+c.color+"33;font-size:"+(sm?"11":"12")+"px"});
  t.innerHTML="<span style='font-size:"+(sm?"8":"9")+"px'>"+c.icon+"</span> "+s;
  return t;
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function calcScore(lead){
  var score=0;
  if(lead.prenom||lead.nom)score++;
  if(lead.telephone)score++;
  if(lead.email)score++;
  if(lead.ville)score++;
  if(lead.bien)score++;
  // Bonus plateforme qualitative
  if(["SeLoger","PAP","Bien'ici"].indexOf(lead.plateforme)>=0)score=Math.min(5,score+0.5);
  // Malus ancienneté
  var age=daysAgo(lead.dateEntree);
  if(age>7)score=Math.max(1,score-1);
  if(age>14)score=Math.max(1,score-1);
  return Math.min(5,Math.round(score));
}

function scoreStars(score,small){
  var d=el("div",{class:"score-stars"});
  for(var i=1;i<=5;i++){
    var s=el("span",{style:"font-size:"+(small?"10":"13")+"px;color:"+(i<=score?"#F59E0B":"#2A2F42")});
    s.textContent="★";d.appendChild(s);
  }
  return d;
}

// ── Templates par défaut ──────────────────────────────────────────────────────
function getDefaultTemplates(){
  return {
    premier_contact:"Bonjour {prenom},\n\nMerci pour votre message concernant {bien}{ville}. Je serais ravi(e) d'échanger avec vous sur votre projet d'achat.\n\nPouvez-vous me préciser votre budget et vos critères essentiels ?\n\nBien cordialement,\n[Votre nom]",
    relance_j1:"Bonjour {prenom},\n\nJe me permets de revenir vers vous suite à votre demande concernant {bien}{ville}. Avez-vous eu l'occasion de consulter les biens disponibles dans ce secteur ?\n\nJe reste disponible pour vous accompagner.\n\nBien cordialement,\n[Votre nom]",
    relance_j3:"Bonjour {prenom},\n\nToujours à votre disposition concernant votre recherche{bien}{ville}. Le marché évolue vite en ce moment — j'ai quelques biens intéressants à vous présenter.\n\nN'hésitez pas à me contacter.\n\nBien cordialement,\n[Votre nom]",
    relance_j7:"Bonjour {prenom},\n\nJe souhaitais m'assurer que votre projet d'acquisition{bien}{ville} est toujours d'actualité. Si vos critères ont évolué, je peux adapter mes recherches.\n\nBien cordialement,\n[Votre nom]",
    rattrapage:"Bonjour {prenom},\n\nNous avions échangé il y a quelque temps concernant {bien}{ville}. Votre projet est-il toujours en cours ? De nouveaux biens correspondant à vos critères viennent de se libérer.\n\nBien cordialement,\n[Votre nom]",
    visite:"Bonjour {prenom},\n\nSuite à nos échanges concernant {bien}{ville}, je vous propose de visiter un bien qui correspond parfaitement à vos critères.\n\nQuelles sont vos disponibilités cette semaine ?\n\nBien cordialement,\n[Votre nom]"
  };
}

function applyTemplate(tpl,lead){
  var ville=lead.ville?" à "+lead.ville:"";
  var bien=lead.bien?" pour "+lead.bien:"";
  return tpl
    .replace(/{prenom}/g,lead.prenom||"")
    .replace(/{nom}/g,lead.nom||"")
    .replace(/{bien}/g,bien)
    .replace(/{ville}/g,ville)
    .replace(/{plateforme}/g,lead.plateforme||"");
}

// ── Notifications ─────────────────────────────────────────────────────────────
function askNotif(cb){
  if(!("Notification"in window)){if(cb)cb(false);return}
  if(Notification.permission==="granted"){if(cb)cb(true);return}
  if(Notification.permission==="denied"){if(cb)cb(false);return}
  Notification.requestPermission().then(function(p){if(cb)cb(p==="granted")});
}
function fireNotif(){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  var last=localStorage.getItem("gl_notif_date");
  if(last===today())return;
  localStorage.setItem("gl_notif_date",today());
  var t=0,r=0;
  state.leads.forEach(function(l){(l.relances||[]).forEach(function(x){
    if(!x.done){if(isToday(x.date))t++;else if(isPast(x.date))r++;}
  })});
  var tot=t+r;
  if(tot>0)new Notification("Gestion Leads — "+tot+" relance"+(tot>1?"s":""),{body:t+" aujourd'hui"+(r?" · "+r+" en retard":""),tag:"gl"});
}

// ── Gemini ────────────────────────────────────────────────────────────────────
var GURL=function(k){return"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+k};
function gText(txt,key,cb){
  fetch(GURL(key),{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:txt}]}],generationConfig:{temperature:0.7,maxOutputTokens:500}})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.error){cb(d.error.message,"");return}
    cb(null,((d.candidates||[])[0]||{content:{parts:[{text:""}]}}).content.parts.map(function(p){return p.text||""}).join("").trim());
  }).catch(function(e){cb(e.message,"")});
}
function gVision(b64,mime,key,cb){
  var p="Tu es expert en captures d'écran immobilières.\nLis TOUT le texte visible et extrais les infos de l'acheteur.\nRéponds UNIQUEMENT avec ce JSON (rien d'autre) :\n{\"prenom\":\"\",\"nom\":\"\",\"telephone\":\"\",\"email\":\"\",\"ville\":\"\",\"bien\":\"\",\"plateforme\":\"\",\"messageBrut\":\"\"}\n- prenom/nom : cherche De:, From:, Nom: ou corps. Incertain = tout dans nom.\n- telephone : tout numéro (+33, 06, 07)\n- email : toute adresse email\n- ville : ville ou secteur\n- bien : type de bien (souvent dans l'objet)\n- plateforme : leboncoin.fr=LeBonCoin seloger.com=SeLoger pap.fr=PAP bienici.com=Bien'ici sinon=Autre\n- messageBrut : texte complet\nChamp absent = vide.";
  fetch(GURL(key),{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mime,data:b64}},{text:p}]}],generationConfig:{temperature:0.1,maxOutputTokens:800}})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.error){cb(d.error.message,null);return}
    var txt=((d.candidates||[])[0]||{content:{parts:[{text:""}]}}).content.parts.map(function(p){return p.text||""}).join("");
    var m=txt.match(/\{[\s\S]*\}/);
    if(!m){cb("Pas de JSON",null);return}
    try{cb(null,JSON.parse(m[0]))}catch(e){cb("JSON invalide",null)}
  }).catch(function(e){cb(e.message,null)});
}

// ── Gmail via Apps Script ─────────────────────────────────────────────────────
function fetchGmailLeads(scriptUrl,cb){
  var lastDate=getLastEmailDate();
  var url=scriptUrl+(scriptUrl.indexOf("?")>=0?"&":"?")+"after="+(lastDate||"");
  fetch(url).then(function(r){return r.json()}).then(function(data){
    cb(null,data.emails||[]);
  }).catch(function(e){cb(e.message,[])});
}

function processGmailEmails(emails,cb){
  if(!emails.length){cb(0,0);return}
  var created=0,duplicates=0,idx=0;
  var results=[];

  function processNext(){
    if(idx>=emails.length){
      // Mettre à jour la date du dernier email traité
      if(emails.length>0)saveLastEmailDate(emails[0].date||today());
      cb(created,duplicates,results);
      return;
    }
    var email=emails[idx++];
    var prompt="Tu es expert en emails immobiliers.\nVoici un email reçu d'un acheteur potentiel.\nExtrais les informations et réponds UNIQUEMENT avec ce JSON :\n{\"prenom\":\"\",\"nom\":\"\",\"telephone\":\"\",\"email\":\"\",\"ville\":\"\",\"bien\":\"\",\"plateforme\":\"\",\"messageBrut\":\"\"}\nContenu de l'email :\nObjet: "+(email.subject||"")+"\\nDe: "+(email.from||"")+"\\n"+(email.body||"");
    gText(prompt,state.apiKey,function(err,res){
      var m=res&&res.match(/\{[\s\S]*\}/);
      if(!err&&m){
        try{
          var data=JSON.parse(m[0]);
          // Vérif doublon
          var doublon=findDoublon(data.telephone);
          if(doublon){
            duplicates++;
            results.push({type:"doublon",email:email,existing:doublon});
          }else{
            var lead=createLeadFromData(data,null,"Email Gmail");
            state.leads=[lead].concat(state.leads);
            created++;
            results.push({type:"created",lead:lead});
          }
        }catch(e){}
      }
      processNext();
    });
  }
  processNext();
}

function createLeadFromData(data,imgData,source){
  return {
    id:genId(),dateEntree:today(),
    prenom:data.prenom||"",nom:data.nom||"",telephone:data.telephone||"",
    email:data.email||"",ville:data.ville||"",bien:data.bien||"",
    plateforme:data.plateforme||source||"",messageBrut:data.messageBrut||"",
    priorite:"Normale",commentaire:"",statut:"Nouveau",lienPhoto:imgData,
    historique:[{date:new Date().toISOString(),action:"Lead créé via "+( source||"import")}],
    relances:[],messageEnvoye:false,contactCree:false,archived:false
  };
}

// ── Doublon ───────────────────────────────────────────────────────────────────
function findDoublon(tel){
  if(!tel||tel.trim()==="")return null;
  var c=tel.replace(/\D/g,"");if(c.length<6)return null;
  return state.leads.find(function(l){return l.telephone&&l.telephone.replace(/\D/g,"")===c})||null;
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function renderSetup(){
  var ki=el("input",{type:"text",placeholder:"AIza...",style:"margin-bottom:12px"});
  var ed=el("div",{style:"display:none;padding:10px;background:#450A0A;border-radius:8px;color:#EF4444;font-size:13px;margin-bottom:12px"});
  var btn=el("button",{class:"btn btn-success btn-full"});btn.textContent="✓ Démarrer";
  btn.onclick=function(){
    var k=ki.value.trim();
    if(!k){ed.textContent="Colle ta clé ici";ed.style.display="block";return}
    btn.textContent="⏳ Vérification…";btn.disabled=true;
    gText("Réponds juste: ok",k,function(err){
      if(err){ed.textContent="Clé invalide : "+err;ed.style.display="block";btn.textContent="✓ Démarrer";btn.disabled=false;}
      else{saveKey(k);setState({apiKey:k});askNotif(function(){fireNotif()});}
    });

function renderListe(){

  sortRow.appendChild(el("span",{style:"font-size:12px;color:#94A3B8;white-space:nowrap"},"Trier :"));

  // Tri

  triRow.appendChild(el("span",{style:"font-size:11px;color:#94A3B8;font-weight:700"},"Trier :"));

  var ld=el("div");root.appendChild(fr);root.appendChild(ld);

      top.appendChild(tl);
      var tr2=el("div",{style:"display:flex;flex-direction:column;align-items:flex-end;gap:4px"});

          var key="premier_contact";

      card.onclick=function(){setState({selectedId:l.id,view:"fiche"})};ld.appendChild(card);
    });

  function mkPills(){

    var ab=el("button",{style:"padding:4px 12px;border-radius:20px;cursor:pointer;font-weight:600;font-size:11px;border:1px solid #2A2F42;background:"+(cf===""?"#3B82F6":"#0F1117")+";color:"+(cf===""?"#fff":"#94A3B8")});

  root.appendChild(el("div",{style:"font-size:22px;font-weight:900;color:#F1F5F9;margin-bottom:4px"},"Pipeline"));
  root.appendChild(el("div",{style:"font-size:13px;color:#94A3B8;margin-bottom:16px"},"Vue par statut"));
  var cols=el("div",{style:"display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;-webkit-overflow-scrolling:touch"});
  Object.keys(ST).forEach(function(s){
    var cfg=ST[s];
    var leads=state.leads.filter(function(l){return l.statut===s});
    var col=el("div",{style:"min-width:180px;flex-shrink:0"});
    var hdr=el("div",{style:"padding:8px 10px;border-radius:8px 8px 0 0;background:"+cfg.bg+";border:1px solid "+cfg.color+"44;border-bottom:none"});
    hdr.innerHTML="<span style='color:"+cfg.color+";font-size:12px;font-weight:800'>"+cfg.icon+" "+s+"</span><span style='float:right;color:"+cfg.color+";font-size:11px;font-weight:700'>"+leads.length+"</span>";
    var body=el("div",{style:"border:1px solid "+cfg.color+"33;border-top:none;border-radius:0 0 8px 8px;padding:8px;min-height:80px;background:#181C27"});
    if(!leads.length)body.appendChild(el("div",{style:"font-size:11px;color:#475569;text-align:center;padding:12px 0"},"Aucun"));
    leads.forEach(function(l){
      var days=daysSince(l.dateEntree);
      var dc=days<=1?"#10B981":days<=3?"#F59E0B":"#EF4444";
      var card=el("div",{style:"background:#1E2333;border:1px solid #2A2F42;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer"});
      card.appendChild(el("div",{style:"font-size:13px;font-weight:700;color:#F1F5F9;margin-bottom:4px"},[l.prenom,l.nom].filter(Boolean).join(" ")||"Sans nom"));
      if(l.bien)card.appendChild(el("div",{style:"font-size:11px;color:#94A3B8;margin-bottom:4px"},l.bien.substring(0,30)));
      var bot=el("div",{style:"display:flex;justify-content:space-between;align-items:center"});
      var sd=el("span");sd.innerHTML=scoreStars(l.score||calcScore(l));
      bot.appendChild(sd);
      bot.appendChild(el("span",{style:"font-size:10px;font-weight:700;color:"+dc},"J+"+days));
      var rip=responseIndicator(l);if(rip)bot.appendChild(rip);
      card.appendChild(bot);
      card.onclick=function(){setState({selectedId:l.id,view:"fiche"})};
      body.appendChild(card);
    });
    col.appendChild(hdr);col.appendChild(body);cols.appendChild(col);
  });
  root.appendChild(cols);return root;
}

function renderRelances(){
  var root=el("div");
  root.appendChild(el("div",{style:"font-size:22px;font-weight:900;color:#F1F5F9;margin-bottom:4px"},"Relances du jour"));
  root.appendChild(el("div",{style:"font-size:13px;color:#94A3B8;margin-bottom:14px"},fmtDate(today())));

  if("Notification"in window){
    if(Notification.permission==="default"){
      var nb=el("div",{class:"notif-bar"});
      nb.appendChild(el("div",{style:"font-size:13px;color:#F1F5F9;flex:1"},"🔔 Activer les rappels relances"));
      var nbtn=el("button",{class:"btn btn-outline btn-sm"});nbtn.textContent="Activer";
      nbtn.onclick=function(){askNotif(function(ok){nb.innerHTML=ok?"<div style='font-size:13px;color:#10B981'>✓ Activées !</div>":"<div style='font-size:13px;color:#EF4444'>Refusé dans les réglages</div>"})};
      nb.appendChild(nbtn);root.appendChild(nb);
    }else if(Notification.permission==="granted"){
      root.appendChild(el("div",{style:"font-size:12px;color:#10B981;margin-bottom:12px"},"🔔 Notifications activées"));
    }
  }

  var t=[],r=[];
  state.leads.forEach(function(l){(l.relances||[]).forEach(function(x){
    if(!x.done){if(isToday(x.date))t.push({lead:l,r:x});else if(isPast(x.date))r.push({lead:l,r:x})}
  })});

  if(!t.length&&!r.length){
    root.appendChild(el("div",{style:"text-align:center;padding:50px 0"},
      [el("div",{style:"font-size:40px;margin-bottom:12px"},"✓"),
       el("div",{style:"font-size:16px;font-weight:700;color:#F1F5F9;margin-bottom:6px"},"Tout est à jour"),
       el("div",{style:"font-size:13px;color:#94A3B8"},"Aucune relance prévue aujourd'hui")]));
    return root;
  }

  function mkSec(title,items,color){
    if(!items.length)return;
    var s=el("div",{style:"margin-bottom:20px"});
    s.appendChild(el("div",{class:"section-title",style:"color:"+color},title+" ("+items.length+")"));
    items.forEach(function(item){
      var canalLabel=item.r.canal==="whatsapp_email"?"📱✉ ":item.r.canal==="email"?"✉ ":"📱 ";
      var c=el("div",{class:"card",style:"border-color:"+color+"33;cursor:pointer"});
      var top=el("div",{style:"display:flex;justify-content:space-between;align-items:flex-start"});
      top.appendChild(el("div",null,[
        el("div",{style:"font-size:14px;font-weight:800;color:#F1F5F9"},[item.lead.prenom,item.lead.nom].filter(Boolean).join(" ")||"Sans nom"),
        el("div",{style:"font-size:12px;color:#94A3B8"},canalLabel+item.r.label+" · "+(item.lead.ville||"—"))
      ]));
      top.appendChild(stag(item.lead.statut,true));c.appendChild(top);
      var row=el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-top:6px"});
      row.appendChild(el("div",{style:"font-size:12px;color:#94A3B8"},item.lead.telephone||"—"));
      var relBtn=el("button",{class:"btn btn-wa btn-sm"});relBtn.innerHTML="💬 Relancer";
      (function(lead,r){relBtn.onclick=function(e){e.stopPropagation();
        var key=r.label.indexOf("J+1")>=0?"relance_j1":r.label.indexOf("J+3")>=0?"relance_j3":"relance_j7";
        openWA(lead,key);
      }})(item.lead,item.r);
      row.appendChild(relBtn);c.appendChild(row);
      c.onclick=function(){setState({selectedId:item.lead.id,view:"fiche"})};s.appendChild(c);
    });root.appendChild(s);
  }
  mkSec("⚡ Aujourd'hui",t,"#F59E0B");mkSec("⚠ En retard",r,"#EF4444");
  return root;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  var root=el("div");
  root.appendChild(el("div",{style:"font-size:22px;font-weight:900;color:#F1F5F9;margin-bottom:4px"},"Tableau de bord"));
  root.appendChild(el("div",{style:"font-size:13px;color:#94A3B8;margin-bottom:20px"},fmtDate(today())));

  var leads=state.leads,total=leads.length;
  var rdvs=leads.filter(function(l){return l.statut==="RDV proposé"||l.statut==="Visite prévue"}).length;
  var retard=0;leads.forEach(function(l){(l.relances||[]).forEach(function(r){if(!r.done&&isPast(r.date))retard++})});
  var weekAgo=addDays(today(),-7);
  var newWeek=leads.filter(function(l){return l.dateEntree>=weekAgo}).length;
  var avgScore=total?Math.round(leads.reduce(function(a,l){return a+calcScore(l)},0)/total*10)/10:0;

  var sg=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px"});
  function sc(num,lbl,color,sub){
    var c=el("div",{class:"stat-card"});
    c.appendChild(el("div",{class:"stat-num",style:"color:"+(color||"#F1F5F9")},num+""));
    c.appendChild(el("div",{class:"stat-label"},lbl));
    if(sub)c.appendChild(el("div",{style:"font-size:11px;color:#475569;margin-top:4px"},sub));
    return c;
  }
  sg.appendChild(sc(total,"Total leads","#3B82F6","dont "+newWeek+" cette semaine"));
  sg.appendChild(sc(rdvs,"RDV / Visites","#8B5CF6"));
  sg.appendChild(sc(retard,"Relances retard",retard>0?"#EF4444":"#10B981"));
  sg.appendChild(sc(avgScore,"Score moyen","#F59E0B","sur 5 ★"));
  root.appendChild(sg);

  if(total>0){
    // Par plateforme
    var platCard=el("div",{class:"card",style:"margin-bottom:16px"});
    platCard.appendChild(el("div",{class:"label",style:"margin-bottom:14px"},"Par plateforme"));
    var platCount={};
    leads.forEach(function(l){var p=l.plateforme||"Autre";platCount[p]=(platCount[p]||0)+1});
    Object.keys(platCount).sort(function(a,b){return platCount[b]-platCount[a]}).forEach(function(p){
      var pct=Math.round(platCount[p]/total*100);
      var row=el("div",{style:"margin-bottom:10px"});
      var rh=el("div",{style:"display:flex;justify-content:space-between;margin-bottom:5px"});
      rh.appendChild(el("span",{style:"font-size:12px;color:#F1F5F9;font-weight:600"},p));
      rh.appendChild(el("span",{style:"font-size:12px;color:#94A3B8"},platCount[p]+" ("+pct+"%)"));
      var bar=el("div",{style:"height:6px;background:#2A2F42;border-radius:3px;overflow:hidden"});
      bar.appendChild(el("div",{style:"height:100%;width:"+pct+"%;background:#3B82F6;border-radius:3px"}));
      row.appendChild(rh);row.appendChild(bar);platCard.appendChild(row);
    });root.appendChild(platCard);

    // Répartition statuts
    var rc=el("div",{class:"card",style:"margin-bottom:16px"});
    rc.appendChild(el("div",{class:"label",style:"margin-bottom:14px"},"Répartition par statut"));
    Object.keys(ST).forEach(function(s){
      var cnt=leads.filter(function(l){return l.statut===s}).length;if(!cnt)return;
      var pct=Math.round(cnt/total*100),c=ST[s];
      var row=el("div",{style:"margin-bottom:10px"});
      var rh=el("div",{style:"display:flex;justify-content:space-between;margin-bottom:5px"});
      rh.appendChild(el("span",{style:"font-size:12px;color:"+c.color+";font-weight:600"},c.icon+" "+s));
      rh.appendChild(el("span",{style:"font-size:12px;color:#94A3B8"},cnt+" ("+pct+"%)"));
      var bar=el("div",{style:"height:6px;background:#2A2F42;border-radius:3px;overflow:hidden"});
      bar.appendChild(el("div",{style:"height:100%;width:"+pct+"%;background:"+c.color+";border-radius:3px"}));
      row.appendChild(rh);row.appendChild(bar);rc.appendChild(row);
    });root.appendChild(rc);

    // Clients dormants
    if(state.dormants.length>0){
      var dc=el("div",{class:"card"});
      dc.appendChild(el("div",{class:"label",style:"margin-bottom:10px"},"📦 Clients dormants ("+state.dormants.length+")"));
      var viewDorm=el("button",{class:"btn btn-ghost btn-full btn-sm"});viewDorm.textContent="Voir la base clients dormants";
      viewDorm.onclick=function(){setState({view:"dormants"})};
      dc.appendChild(viewDorm);root.appendChild(dc);
    }
  }else{
    root.appendChild(el("div",{style:"text-align:center;padding:40px 0"},
      [el("div",{style:"font-size:36px;margin-bottom:12px"},"📊"),
       el("div",{style:"font-size:14px;color:#94A3B8"},"Aucun lead encore")]));
  }
  return root;
}

    btnRow.appendChild(reactBtn);btnRow.appendChild(waBtn2);card.appendChild(btnRow);

  else if(state.view==="settings")content.appendChild(renderSettings());
  else content.appendChild(renderRelances());
  app.appendChild(content);

  // Nav — 5 onglets
  var relBadge=state.leads.reduce(function(a,l){return a+(l.relances||[]).filter(function(r){return!r.done&&(isToday(r.date)||isPast(r.date))}).length},0);
  var nav=el("div",{class:"nav"});
  [
    {id:"relances",label:"Relances",icon:"⚡",badge:relBadge,bc:"#F59E0B"},

    {id:"nouveau",label:"Nouveau",icon:"+",accent:true},
    {id:"pipeline",label:"Pipeline",icon:"▦"},{id:"dashboard",label:"Stats",icon:"📊"},
    {id:"settings",label:"Config",icon:"⚙️"}
  ].forEach(function(n){

    btn.onclick=function(){setState({view:n.id})};nav.appendChild(btn);

            saveLeads(state.leads);
            if("Notification"in window&&Notification.permission==="granted"){
              new Notification("Gestion Leads — "+created+" nouveau"+(created>1?"x":"")+" lead"+(created>1?"s":""),{body:"Récupéré depuis leadsefco@gmail.com",tag:"gl-gmail"});
            }
            render();
          }
        });
      }
    });
  },2000);
}
</script>
